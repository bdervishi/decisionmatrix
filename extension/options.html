<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entscheidungsmatrix — Einstellungen</title>
  </head>
  <body>
    <div class="opt">
      <div class="opt-head">
        <div class="opt-mark">◈</div>
        <h1>Einstellungen</h1>
      </div>

      <label class="opt-field">
        <span class="opt-label">KI-Backend-URL</span>
        <input type="url" id="backendUrl" placeholder="https://dein-deployment.vercel.app/api/generate" />
        <span class="opt-hint">Endpoint deiner gehosteten Vorschlagsfunktion. Leer lassen =
          nur der lokale Vorschlags-Modus (ohne KI).</span>
      </label>

      <label class="opt-field">
        <span class="opt-label">Share-Basis-URL</span>
        <input type="url" id="shareBaseUrl" placeholder="https://dein-deployment.vercel.app/" />
        <span class="opt-hint">Öffentliche Web-App für Teilen-Links. Ohne Angabe zeigen Links
          auf die interne Extension-Seite und lassen sich nicht extern öffnen.</span>
      </label>

      <div class="opt-sep"></div>

      <label class="opt-field">
        <span class="opt-label">Eigener Anthropic API-Key <span class="opt-tag">Alternative</span></span>
        <input type="password" id="apiKey" autocomplete="off" placeholder="sk-ant-…" />
        <span class="opt-hint">Nur nötig, wenn du <strong>kein</strong> Backend nutzt. Dann ruft die
          Extension Claude direkt auf. Der Key bleibt lokal im Browser, wird aber direkt an
          Anthropic gesendet — bequemer, aber weniger sicher als das serverseitige Backend.
          Ist eine Backend-URL gesetzt, wird diese bevorzugt und der Key ignoriert.</span>
      </label>

      <div class="opt-actions">
        <button class="opt-save" id="save">Speichern</button>
        <span class="opt-status" id="status" role="status" aria-live="polite"></span>
      </div>
    </div>
    <script type="module" src="/src/options.js"></script>
  </body>
</html>
